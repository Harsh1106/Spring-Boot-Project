<header class="app-header">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" routerLink="/homepage">📦 Parcel Service</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto" *ngIf="shouldShowNavLinks()">
          <!-- Customer Navigation Links -->
          <li class="nav-item" *ngIf="isAuthenticated && isCustomer">
            <a class="nav-link" routerLink="/customer-home" routerLinkActive="active">Home</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isCustomer">
            <a class="nav-link" [routerLink]="['/customer-booking']" routerLinkActive="active">Booking</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isCustomer">
            <a class="nav-link" routerLink="/customer-tracking" routerLinkActive="active">Tracking</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isCustomer">
            <a class="nav-link" routerLink="/customer-booking-history" routerLinkActive="active">Previous Bookings</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isCustomer">
            <a class="nav-link" routerLink="/contact-support" routerLinkActive="active">Contact</a>
          </li>

          <!-- Officer Navigation Links -->
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/officer-home" routerLinkActive="active">Home</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/officer-booking" routerLinkActive="active">Booking</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/officer-tracking" routerLinkActive="active">Tracking</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/delivery-status" routerLinkActive="active">Update Status</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/pickup-drop-update" routerLinkActive="active">Pickup and Drop Schedule</a>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated && isOfficer">
            <a class="nav-link" routerLink="/officer-booking-history" routerLinkActive="active">Bookings</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto" *ngIf="shouldShowNavLinks()">
          <!-- Unauthenticated Links -->
          <li class="nav-item" *ngIf="!isAuthenticated">
            <a class="nav-link" routerLink="/homepage">Home</a>
          </li>
          <li class="nav-item" *ngIf="!isAuthenticated">
            <a class="nav-link" routerLink="/registration">Register</a>
          </li>
          <li class="nav-item" *ngIf="!isAuthenticated">
            <a class="nav-link" routerLink="/login">Login</a>
          </li>
          
          <!-- Authenticated User Info -->
          <li class="nav-item" *ngIf="isAuthenticated && currentUser">
            <span class="nav-link user-welcome">
              <span class="user-icon">👤</span>
              Welcome, {{ currentUser.name }}
            </span>
          </li>
          <li class="nav-item" *ngIf="isAuthenticated">
            <a class="nav-link logout-link" (click)="logout()" style="cursor: pointer;">
              <span class="logout-icon">🚪</span>
              Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
